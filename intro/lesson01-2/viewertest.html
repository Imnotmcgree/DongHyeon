<!DOCTYPE html>

<head>

<title></title>
<style>
html, body{margin: 0;padding: 0;width: 100%;height: 100%;background: #fff;overflow: hidden;}
iframe{border: 0;display: block}
#wrapper{position: relative;width: 100vw;height: 980px;transform-origin: 0 0;overflow: hidden}
</style>
</head>
<body>

<div id="wrapper">
    <iframe id="iframePlayer" class="hide" src="./index.html"  frameborder="0" width="840" height="620" scrolling="no"></iframe>

    <button type="button" onclick="terminate()">terminate</button>
</div>

<script>
    window.addEventListener("message", receiveMessage, false);

    function receiveMessage(event) {

    }


    // terminated test
    function terminate(){
        document.getElementById('iframePlayer').contentWindow.postMessage({
            type: "terminated"
        }, "*");
    }

</script>
</body>
</html>
