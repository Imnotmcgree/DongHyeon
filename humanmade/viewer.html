<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" dir="ltr" lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title></title>
<style>
/* 다른 사이트 iframe 임베드: PC 풀스크린(1920x980) 비율 유지, 크기 변경 시에도 비율 유지 */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #fff;
  overflow: hidden;
  -webkit-overflow-scrolling: touch;
}
#wrapper {
  position: absolute;
  left: 0;
  top: 0;
  width: 1920px;
  height: 980px;
  transform-origin: 0 0;
  box-sizing: border-box;
}
#iframePlayer {
  border: 0;
  display: block;
  width: 1920px;
  height: 980px;
  scrolling: auto;
}
</style>
</head>
<body>

<div id="wrapper">
    <iframe id="iframePlayer" src="./index.html" frameborder="0" scrolling="auto"></iframe>

</div>

<script>
    var DESIGN_W = 1920, DESIGN_H = 980;

    function fitScale() {
        var w = window.innerWidth, h = window.innerHeight;
        var scale = Math.min(w / DESIGN_W, h / DESIGN_H);
        var wrapper = document.getElementById("wrapper");
        wrapper.style.transform = "scale(" + scale + ")";
        wrapper.style.width = DESIGN_W + "px";
        wrapper.style.height = DESIGN_H + "px";
    }

    fitScale();
    window.addEventListener("resize", fitScale);

    window.addEventListener("message", receiveMessage, false);

    function receiveMessage(event) {

    }

    function terminate(){
        document.getElementById('iframePlayer').contentWindow.postMessage({
            type: "terminated"
        }, "*");
    }
</script>
</body>
</html>
