<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form_2</title>

    <link rel="stylesheet" href="./asset/css/bootstrap.min.css">
    <link rel="stylesheet" href="./asset/css/swiper-bundle.min.css">
    <link rel="stylesheet" href="./asset/css/style.min.css">

    <script src="./asset/js/jquery-3.7.1.min.js"></script>
    <script src="./asset/js/bootstrap.bundle.min.js"></script>
    <script src="./asset/js/swiper-bundle.min.js"></script>
    <script>
        $(document).ready(function() {
            $('.form-type1').click(function() {
                $('.form-type1.active').removeClass('active');
                $(this).toggleClass('active');
            });
        });
    </script>
</head>
<body>
    <div class="wrap">
        <div class="container">
            <main class="form-2">
                <section class="form-section">
                    <h1 class="tit01">Choose Your Payment Method</h1>
                    <form class="form-type1 line">
                        <div class="type1-wrap">
                            <input class="position-absolute" type="checkbox" id="Paypal" name="payment-method" value="Paypal" style="   top: 0px;left: -36px;">
    
                            <span class="type1-contents">
                                <label class="text-navy" for="Paypal">PayPal</label>
                                <span class="form-text text-muted">
                                    Safe payment online. Credit card needed. PayPal account is not necessary.
                                </span>
                                <div class="row mT30">
                                    <div class="col-6">
                                        <input class="col-12" type="text" placeholder="Email address">
                                    </div>
                                </div>
                            </span>
                        </div>
                    </form>
    
                    <form class="form-type1 line mT30 active">
                        <div class="credit-card-bg">
                            <img src="./asset/img/form-img/visa.png" alt="">
                            <img src="./asset/img/form-img/mastercard.png" alt="">
                            <img src="./asset/img/form-img/discover.png" alt="">
                            <img src="./asset/img/form-img/amex.png" alt="">
                        </div>
    
                        <div class="type1-wrap">
                            <input class="position-absolute" type="checkbox" id="Credit-card" name="payment-method" value="Credit-card" style="top: 0px;left: -36px;" checked>
    
                            <span class="type1-contents">
                                <label class="text-navy" for="credit-card">Credit Card</label>
                                <span class="form-text text-muted">
                                    Safe payment online. Credit card needed. PayPal account is not necessary.
                                </span>
                                <div class="row mT30">
                                    <div class="col-lg-6 col-12">
                                        <label class="text-navy info" for="credit-card-number">
                                            CREDIT CARD NUMBER
                                        </label>
                                        <input class="col-12" type="text" id="credit-card-number">
                                    </div>
                                    <div class="col-lg-6 col-12">
                                        <label class="text-navy info" for="expiration">
                                            EXPIRATION
                                        </label>
                                        <input class="col-12" type="text" id="expiration">
                                    </div>
                                </div>
                                <div class="row mT30">
                                    <div class="col-lg-6 col-12">
                                        <label class="text-navy info" for="cardholder-name">
                                            CARDHOLDER NAME
                                        </label>
                                        <input class="col-12" type="text" id="cardholder-name">
                                    </div>
                                    <div class="col-lg-6 col-12">
                                        <label class="text-navy info" for="cvv-code">
                                            CVV CODE
                                        </label>
                                        <input class="col-3" type="text" id="cvv-code">
                                    </div>
                                </div>
                            </span>
    
                            <button type="submit" class="cyan text-white rounded-form">Checkout</button>
                        </div>
                    </form>
                
                </section>
            </main>
        </div>
    </div>
</body>
</html>
