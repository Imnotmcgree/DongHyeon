<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form_1</title>

    <link rel="stylesheet" href="./asset/css/bootstrap.min.css">
    <link rel="stylesheet" href="./asset/css/swiper-bundle.min.css">
    <link rel="stylesheet" href="./asset/css/style.min.css">

    <script src="./asset/js/jquery-3.7.1.min.js"></script>
    <script src="./asset/js/bootstrap.bundle.min.js"></script>
    <script src="./asset/js/swiper-bundle.min.js"></script>
</head>
<body>
    <div class="wrap">
        <main class="form-1">
            <section class="form-section">
                <h1 class="tit01">Sign Up Now</h1>
                <form>
                    <input type="email" id="email" name="email" placeholder="Your email" required>

                    <input type="password" id="password" name="password" placeholder="Your password" required>
                    
                    <div class="form-check form-check-inline">
                        <input type="checkbox" id="agree" name="consent" value="agree">
                        <label for="agree">I agree to the Terms of Service.</label>
                    </div>
                    
                    <button type="submit" class="cyan text-white w-100 rounded-form">Create an Account</button>
                </form>
                <p class="sign-in text-center">Do you have an Account? <a class="text-cyan mL10" href="#">Sign In</a></p>
            </section>
        </main>
    </div>
</body>
</html>
